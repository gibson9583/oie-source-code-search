# Publishes the plugin to GitHub Releases in the shape the OIE Community Store
# expects (extension zip + .sha256 sidecar), on a semver tag:
#
#   git tag v1.2.0 && git push <remote> v1.2.0
#
# The tag drives the Maven version via -Drevision, so plugin.xml's pluginVersion
# (what the engine reports as "installed") matches oie.json, keeping the store's
# update detection accurate. oie.json is verified to match the tag.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # required to create the GitHub Release

env:
  OIE_TAG: v4.6.0-rc1
  OIE_TARBALL: oie_unix_4_6_0-rc1.tar.gz
  MC_VERSION: '4.6.0'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve and verify version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(jq -r .version oie.json)"; MANIFEST_VERSION="${MANIFEST_VERSION#v}"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version $VERSION but oie.json says $MANIFEST_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache OIE distribution
        id: oie-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OIE_TARBALL }}
          key: oie-dist-${{ env.OIE_TAG }}

      - name: Download OIE distribution
        if: steps.oie-cache.outputs.cache-hit != 'true'
        run: curl -fSL -o "$OIE_TARBALL" "https://github.com/OpenIntegrationEngine/engine/releases/download/${OIE_TAG}/${OIE_TARBALL}"

      - name: Install engine jars into the local Maven repo
        run: |
          tar xzf "$OIE_TARBALL" \
            oie/server-lib/mirth-server.jar \
            oie/server-lib/mirth-client-core.jar \
            oie/client-lib/mirth-client.jar \
            oie/server-lib/donkey/donkey-server.jar
          for pair in \
            "mirth-server:oie/server-lib/mirth-server.jar" \
            "mirth-client-core:oie/server-lib/mirth-client-core.jar" \
            "mirth-client:oie/client-lib/mirth-client.jar" \
            "donkey-server:oie/server-lib/donkey/donkey-server.jar"; do
            a="${pair%%:*}"; p="${pair#*:}"
            mvn -q install:install-file -Dfile="$p" -DgroupId=com.mirth.connect -DartifactId="$a" -Dversion="$MC_VERSION" -Dpackaging=jar
          done

      # Keep the (cosmetic) web plugin.json version in step with the release too.
      - name: Stamp web plugin version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s|\"version\":[[:space:]]*\"[^\"]*\"|\"version\": \"${VERSION}\"|" package/webadmin/plugin.json

      - name: Build
        run: mvn -B -ntp -Drevision="${{ steps.ver.outputs.version }}" -DskipTests package

      - name: Stage the release asset and checksum
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC="$(find package/target -maxdepth 1 -name 'oie-source-code-search-*.zip' | head -n1)"
          if [ -z "$SRC" ]; then
            echo "::error::No plugin zip found in package/target"; ls -l package/target || true; exit 1
          fi
          ASSET="oie-source-code-search-${VERSION}.zip"
          mkdir -p out
          cp "$SRC" "out/${ASSET}"
          ( cd out && sha256sum "${ASSET}" > "${ASSET}.sha256" )
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/${{ steps.pkg.outputs.asset }}
            out/${{ steps.pkg.outputs.asset }}.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Auto-files the version manifest PR to the community catalog. Appended to this
  # workflow because the release above is created with GITHUB_TOKEN, which does
  # NOT fire `on: release` for a standalone workflow. Requires the CATALOG_TOKEN
  # secret (fine-grained PAT: Contents + Pull requests read/write on the catalog).
  catalog-manifest:
    needs: release
    runs-on: ubuntu-latest
    env:
      CATALOG_REPO: gibson9583/oie-community-catalog
      PLUGIN_ID: oie-source-code-search
      GH_TOKEN: ${{ secrets.CATALOG_TOKEN }}
    steps:
      - name: Require the catalog token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CATALOG_TOKEN secret is not set — cannot open the catalog PR."
            exit 1
          fi

      - name: Resolve tag, download and digest the release asset
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Public asset URL, no auth: the CATALOG_TOKEN is scoped to the catalog
          # repo and must not be relied on for reads here. Retry: the asset was
          # uploaded moments ago by the release job.
          curl -fL --retry 5 --retry-delay 5 -o asset.zip \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/${PLUGIN_ID}-${VERSION}.zip"
          echo "SHA256=$(sha256sum asset.zip | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Read manifest fields from the tagged oie.json
        run: |
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/$TAG/oie.json" -o oie.json
          echo "MIN_ENGINE=$(node -p "JSON.parse(require('fs').readFileSync('oie.json','utf8')).minEngineVersion")" >> "$GITHUB_ENV"
          echo "STORE_DOCS=$(node -p "JSON.parse(require('fs').readFileSync('oie.json','utf8')).storeDocs || 'docs/store.md'")" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          repository: gibson9583/oie-community-catalog
          token: ${{ secrets.CATALOG_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write the version manifest
        run: |
          mkdir -p "manifests/plugins/${PLUGIN_ID}"
          cat > "manifests/plugins/${PLUGIN_ID}/${VERSION}.json" <<EOF
          {
              "version": "${VERSION}",
              "minEngineVersion": "${MIN_ENGINE}",
              "maxEngineVersion": null,
              "installerUrl": "https://github.com/${{ github.repository }}/releases/download/${TAG}/${PLUGIN_ID}-${VERSION}.zip",
              "sha256": "${SHA256}",
              "restartRequired": true,
              "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "releaseNotesUrl": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
              "docsUrl": "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/${STORE_DOCS}"
          }
          EOF

      - name: Validate (schema + digest download)
        run: node scripts/build-index.mjs --lint --verify "manifests/plugins/${PLUGIN_ID}/${VERSION}.json"

      - name: Open the catalog PR
        run: |
          BRANCH="${PLUGIN_ID}-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add manifests
          git commit -m "${PLUGIN_ID} ${VERSION}"
          git push -f origin "$BRANCH"
          if gh pr list -R "$CATALOG_REPO" --head "$BRANCH" --json number -q '.[0].number' | grep -q .; then
            echo "PR already open for $BRANCH — branch updated."
          else
            gh pr create -R "$CATALOG_REPO" --head "$BRANCH" \
              --title "${PLUGIN_ID} ${VERSION}" \
              --body "Automated manifest for [${PLUGIN_ID} ${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG}). Digest computed from the release asset and verified again by catalog CI."
          fi
